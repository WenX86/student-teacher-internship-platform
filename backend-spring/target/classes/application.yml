server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: internship-platform-backend
  datasource:
    url: jdbc:h2:mem:internship_platform;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
      path: /h2-console
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 50MB
  sql:
    init:
      mode: always
      encoding: UTF-8
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: assign_id

app:
  file-storage:
    root: ${APP_FILE_STORAGE_ROOT:./storage/uploads}
    max-size-bytes: ${APP_FILE_MAX_SIZE_BYTES:10485760}

logging:
  level:
    # 屏蔽Spring Security自动生成密码的打印
    org.springframework.boot.autoconfigure.security: ERROR
    # 屏蔽H2数据库连接/控制台的日志输出
    org.springframework.boot.autoconfigure.h2: ERROR
    com.zaxxer.hikari: ERROR
  # 额外防护：禁止日志打印任何包含"password"、"jdbc"的敏感内容
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg.replace('password=','password=***').replace('jdbc:','jdbc:***')%n"