server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework
  servlet:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  datasource:
    url: jdbc:mysql://${DB_HOST:127.0.0.1}:${DB_PORT:3306}/${DB_NAME:internship_platform}?useUnicode=true&characterEncoding=UTF-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=${DB_SSL:false}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  h2:
    console:
      enabled: false
  sql:
    init:
      mode: never
  jackson:
    default-property-inclusion: non_null
    time-zone: Asia/Shanghai

logging:
  level:
    root: INFO
    com.internship.platform: INFO
    org.springframework.security: WARN

app:
  security:
    allowed-origins: ${APP_SECURITY_ALLOWED_ORIGINS:https://internship.example.com}
    h2-console-enabled: false